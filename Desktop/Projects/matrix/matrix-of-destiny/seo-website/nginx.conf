server {
    listen 80;
    server_name yourmatrixofdestiny.com www.yourmatrixofdestiny.com;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect / to /uk/
    location = / {
        return 301 /uk/;
    }

    # Locale-less legal routes → UK versions
    location = /privacy { return 301 /uk/privacy/; }
    location = /privacy/ { return 301 /uk/privacy/; }
    location = /terms { return 301 /uk/privacy/; }
    location = /terms/ { return 301 /uk/privacy/; }

    # Redirect www to non-www
    if ($host = www.yourmatrixofdestiny.com) {
        return 301 https://yourmatrixofdestiny.com$request_uri;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "origin-when-cross-origin" always;

    # Static assets caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Sitemap and robots
    location = /sitemap.xml {
        try_files /sitemap.xml =404;
    }
    location = /robots.txt {
        try_files /robots.txt =404;
    }

    # API proxy → destiny `api` container via docker DNS on the shared compose network.
    # Single location handles regular POSTs and SSE streaming; proxy_buffering off
    # lets Anthropic's event stream pass through as tokens arrive.
    location /api/ {
        # Use a resolver so nginx doesn't cache the docker DNS name at startup (lets api restart independently)
        resolver 127.0.0.11 valid=10s;
        set $api_upstream http://api:3101;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # SSE-friendly: no buffering, no gzip, long read timeout
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # STT/TTS upload size cap (backend enforces 25 MB)
        client_max_body_size 30m;
    }

    # Redirect retired Tarot routes (brand kept the domain, but Tarot features were removed)
    location ~ ^/(uk|en)/tarot-online(/.*)?$ {
        return 301 /$1/;
    }
    location ~ ^/(uk|en)/karta-dnya(/.*)?$ {
        return 301 /$1/;
    }
    location ~ ^/(uk|en)/wiki/(starshi-arkany|tarot-znachennya)(/.*)?$ {
        return 301 /$1/wiki/;
    }

    # SPA fallback for locale routes
    location /uk/ {
        try_files $uri $uri/index.html /uk/index.html;
    }
    location /en/ {
        try_files $uri $uri/index.html /en/index.html;
    }

    # Expo web build — served from bind-mounted ./dist (Expo SPA, single bundle)
    location /app/ {
        alias /usr/share/nginx/html/app/;
        try_files $uri $uri/ /app/index.html;
    }
    location = /app {
        return 301 /app/;
    }

    # Expo bundle uses absolute paths (/_expo/…, /assets/…).
    # `^~` modifier makes these prefix locations beat the generic ~* regex above.
    location ^~ /_expo/ {
        alias /usr/share/nginx/html/app/_expo/;
        access_log off;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }
    location ^~ /assets/ {
        alias /usr/share/nginx/html/app/assets/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Default fallback
    location / {
        try_files $uri $uri/ $uri/index.html /uk/index.html;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml text/xml application/xml;
}
